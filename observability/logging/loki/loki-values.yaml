loki:
  # General Configuration
  auth_enabled: false
  
  commonConfig:
    replication_factor: 1

  # Setting Loki to single binary mode which is great for starting out natively
  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: index_
          period: 24h

  storage:
    type: "filesystem" # For production, switch to "s3"

# Enable tracing and metrics for Loki components
monitoring:
  selfMonitoring:
    enabled: true
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false
