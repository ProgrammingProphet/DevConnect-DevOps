kind: HorizontalPodAutoscaler
apiVersion: autoscaling/v2
metadata:
  name: frontend-hpa
  namespace: devconnect
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend-deployment
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50


#command to create hpa: kubectl apply -f hpa.yml
#command to delete hpa: kubectl delete -f hpa.yml

#command to check hpa: kubectl get hpa -n devconnect
#command to check hpa details: kubectl describe hpa frontend-hpa -n devconnect
