kind: Service
apiVersion: v1
metadata:
  name: backend-service
  namespace: devconnect
spec:
  selector:
    app: backend-devconnect # must match the label of the pod
  ports:
    - protocol: TCP
      port: 5000 # external port
      targetPort: 5000 # internal port

#command to create service: kubectl apply -f backend/service.yml
#command to delete service: kubectl delete -f backend/service.yml
