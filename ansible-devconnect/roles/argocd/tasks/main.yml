---
- name: Add ArgoCD Helm repository
  kubernetes.core.helm_repository:
    name: argo
    repo_url: https://argoproj.github.io/argo-helm

- name: Install or Upgrade ArgoCD via Helm
  kubernetes.core.helm:
    name: argocd
    chart_ref: argo/argo-cd
    release_namespace: argocd
    update_repo_cache: yes
    values:
      server:
        service:
          type: LoadBalancer

- name: Wait for ArgoCD server load balancer to be provisioned
  command: kubectl get svc argocd-server -n argocd -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
  register: argocd_lb
  until: argocd_lb.stdout != ""
  retries: 30
  delay: 10
  changed_when: false

- name: Display ArgoCD LoadBalancer URL
  debug:
    msg: "ArgoCD is available at: http://{{ argocd_lb.stdout }}"

- name: Retrieve ArgoCD initial admin password
  command: kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}"
  register: argocd_admin_secret_b64
  changed_when: false

- name: Decode ArgoCD admin password
  set_fact:
    argocd_admin_password: "{{ argocd_admin_secret_b64.stdout | b64decode }}"

- name: Display ArgoCD initial admin password
  debug:
    msg: "ArgoCD initial admin password is: {{ argocd_admin_password }}"

- name: Deploy application manifest to ArgoCD
  kubernetes.core.k8s:
    state: present
    namespace: argocd
    definition:
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: devconnect-app
        namespace: argocd
      spec:
        project: default
        source:
          repoURL: "{{ argocd_repo_url }}"
          targetRevision: main
          path: k8s
        destination:
          server: 'https://kubernetes.default.svc'
          namespace: "{{ app_namespace }}"
        syncPolicy:
          automated:
            prune: true
            selfHeal: true
          syncOptions:
            - CreateNamespace=true
