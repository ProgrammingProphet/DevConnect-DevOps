apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devconnect-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/YOUR_USERNAME/DevConnect.git' # TODO: Replace with your actual GitHub repository URL
    targetRevision: main
    path: k8s # The path to your Kubernetes manifests in the repository
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default # Assuming your app deploys to the 'default' namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
