# 4. deploy

# deploy to EKS using git actions ci cd
name: Build DevConnect images and Upload to Docker Hub

on:
  push:
    branches:
      - main

jobs:
  # -------------------------------
  # CI: Build & Push Docker Image
  # -------------------------------
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: | #why this used - for multiple tags
            ${{ secrets.DOCKER_USERNAME }}/devconnect-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/devconnect-frontend:${{ github.sha }}

      - name: Build and push backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/devconnect-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/devconnect-backend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Deploy to EKS
        uses: argoproj/argo-cd-action@v1
        with:
          action: deploy
          url: ${{ secrets.ARGOCD_URL }}
          username: ${{ secrets.ARGOCD_USERNAME }}
          password: ${{ secrets.ARGOCD_PASSWORD }}
          application: ${{ secrets.ARGOCD_APPLICATION }}
          namespace: ${{ secrets.ARGOCD_NAMESPACE }}
          manifests: |
            k8s/namespace.yml
            k8s/secrets.yml
            k8s/configMap.yml
            k8s/database/persistantVolume.yml
            k8s/database/persistantVolumeClaim.yml
            k8s/database/deploymet.yml
            k8s/database/service.yml
            k8s/backend/deployment.yml
            k8s/backend/service.yml
            k8s/frontend/deployment.yml
            k8s/frontend/service.yml
            k8s/ingress.yml
          images: |
            ${{ secrets.DOCKER_USERNAME }}/devconnect-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/devconnect-backend:latest
