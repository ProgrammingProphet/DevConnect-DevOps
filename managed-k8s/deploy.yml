# This workflow will deploy the application to the Kubernetes cluster

name: Deploy to Kubernetes

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devconnect-frontend:latest

      - name: Build and push backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devconnect-backend:latest

      - name: Deploy to Kubernetes
        uses: azure/k8s-deploy@v4
        with:
          action: deploy
          manifests: |
            k8s/namespace.yml
            k8s/secrets.yml
            k8s/configMap.yml
            k8s/database/persistantVolume.yml
            k8s/database/persistantVolumeClaim.yml
            k8s/database/deploymet.yml
            k8s/database/service.yml
            k8s/backend/deployment.yml
            k8s/backend/service.yml
            k8s/frontend/deployment.yml
            k8s/frontend/service.yml
            k8s/ingress.yml
          images: |
            ${{ secrets.DOCKER_USERNAME }}/devconnect-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/devconnect-backend:latest
