#deploy to aks using git action cd
#Deploy to Kubernetes
name: Build DevConnect images and Upload to Docker Hub

on:
  push:
    branches:
      - main

jobs:
  # -------------------------------
  # CI: Build & Push Docker Image
  # -------------------------------
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: | #why this used - for multiple tags
            ${{ secrets.DOCKER_USERNAME }}/devconnect-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/devconnect-frontend:${{ github.sha }}

      - name: Build and push backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/devconnect-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/devconnect-backend:${{ github.sha }}

